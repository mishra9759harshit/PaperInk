name: Build PaperInk Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: ['x86', 'x64'] # Builds both 32-bit (Universal) and 64-bit

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: ${{ matrix.architecture }}

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r python_app/requirements.txt
        python -m pip install nuitka zstandard

    - name: Compile Executable with Nuitka
      working-directory: ./python_app
      run: |
        python -m nuitka --assume-yes-for-downloads --onefile --standalone --windows-console-mode=disable --windows-icon-from-ico=assets/icon.ico --include-data-dir=assets=assets --output-filename=PaperInk_${{ matrix.architecture }}.exe main.py

    - name: Generate MSIX Assets
      working-directory: ./python_app
      run: |
        python -m pip install Pillow
        python build_msix_assets.py

    - name: Build MSIX Staging Layout
      working-directory: ./python_app
      run: |
        mkdir MsixLayout
        mkdir MsixLayout\Assets
        
        # Place Executable
        cp PaperInk_${{ matrix.architecture }}.exe MsixLayout\PaperInk.exe
        
        # Place Manifest
        cp AppxManifest.xml MsixLayout\AppxManifest.xml
        
        # Place Microsoft Store Visual Assets
        Copy-Item -Path MSStore_Assets\* -Destination MsixLayout\Assets\ -Recurse

    - name: Pack MSIX with MakeAppx
      working-directory: ./python_app
      run: |
        $makeAppx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -Recurse | Select-Object -First 1).FullName
        & $makeAppx pack /d MsixLayout /p PaperInk_${{ matrix.architecture }}.msix /l

    - name: Upload EXE Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PaperInk-Standalone-${{ matrix.architecture }}
        path: python_app/PaperInk_${{ matrix.architecture }}.exe

    - name: Upload MSIX Store Package
      uses: actions/upload-artifact@v4
      with:
        name: PaperInk-MSStore-${{ matrix.architecture }}
        path: python_app/PaperInk_${{ matrix.architecture }}.msix
