name: Build PaperInk (32‑bit)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-32bit:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
        architecture: [ "x86" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} (${{ matrix.architecture }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate assets (icons & MSIX assets)
        run: |
          python build_msix_assets.py

      - name: Clean previous builds
        run: |
          if exist "build" rd /s /q "build"
          if exist "dist" rd /s /q "dist"

      - name: Build executable with PyInstaller (bundle media)
        run: |
          pyinstaller --onefile --windowed \
            --icon="assets/icon.ico" \
            --add-data "assets;assets" \
            --name "PaperInk" \
            main.py

      - name: Verify build output
        run: |
          if not exist "dist\PaperInk.exe" (exit /b 1)

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperInk-Executable
          path: dist/PaperInk.exe

      - name: Create Release (optional – uncomment to enable)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PaperInk Build ${{ github.run_number }}"
          files: dist/PaperInk.exe
          draft: false
          prerelease: false
