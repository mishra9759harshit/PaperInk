name: Build PaperInk Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: ['x86', 'x64'] # Builds both 32-bit (Universal) and 64-bit

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: ${{ matrix.architecture }}

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r python_app/requirements.txt
        pip install pyinstaller

    - name: Compile Executable with PyInstaller
      working-directory: ./python_app
      run: |
        pyinstaller --noconsole --onefile --icon=assets/icon.ico --add-data="assets;assets" --name=PaperInk_${{ matrix.architecture }} main.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PaperInk-Standalone-${{ matrix.architecture }}
        path: python_app/dist/PaperInk_${{ matrix.architecture }}.exe
